<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireRed Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #23232f;
  --surface: #2c2c3e;
  --surface2: #34344a;
  --surface3: #3c3c56;
  --border: rgba(255,255,255,0.10);
  --border-hover: rgba(255,255,255,0.20);
  --accent: #ff3d3d;
  --accent2: #ff6b35;
  --accent-glow: rgba(255,61,61,0.25);
  --text: #f0f0f8;
  --text-muted: #6b6b80;
  --text-sub: #9898aa;
  --gold: #fbbf24;
  --green: #34d399;
  --blue: #60a5fa;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%, rgba(255,61,61,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 300px at 90% 80%, rgba(255,107,53,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 16px;
  height: 64px;
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.5px; display: block; line-height: 1; }
.nav { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; margin-left: auto; }
.nav::-webkit-scrollbar { display: none; }
.nav-tab {
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  padding: 6px 14px; border-radius: 8px; cursor: pointer;
  color: var(--text-muted); white-space: nowrap; border: none; background: none;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active { color: var(--accent); background: rgba(255,61,61,0.1); }
.snav-item { display:block;width:100%;text-align:center;padding:11px 16px;background:none;border:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s; }
.snav-item:hover { background:var(--surface2); }
.snav-item.active { color:var(--accent);background:rgba(255,61,61,0.08);font-weight:700; }
.main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
.panel { display: none; }
.panel.active { display: block; animation: slideUp 0.25s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.section-head { margin-bottom: 24px; }
.section-head h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.section-head p { color: var(--text-muted); font-size: 14px; }
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input {
  width: 100%;
  background: #fff;
  border: 2.5px solid #fff;
  border-radius: 16px; color: #111;
  font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 700;
  padding: 12px 18px 12px 52px; outline: none;
  transition: all 0.25s;
  box-shadow: 0 6px 32px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.9);
  letter-spacing: 0.1px;
}
.search-wrap input::placeholder { color: #aaa; font-weight: 400; }
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(255,61,61,0.25), 0 6px 32px rgba(0,0,0,0.35);
}
.search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 18px; pointer-events: none; }
.filter-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.pill {
  font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 100px;
  cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; opacity: 0.7; letter-spacing: 0.3px;
}
.pill:hover { opacity: 1; }
.pill.active { opacity: 1; border-color: rgba(255,255,255,0.4); }
.pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
.poke-card {
  background: #fff; border: 1px solid rgba(0,0,0,0.08);
  border-radius: var(--radius); padding: 16px 12px 12px;
  cursor: pointer; transition: all 0.2s; text-align: center; position: relative; overflow: hidden;
}
.poke-card::before {
  content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s;
  background: radial-gradient(ellipse at top, var(--card-color, rgba(255,61,61,0.08)), transparent 70%);
}
.poke-card:hover { border-color: rgba(0,0,0,0.15); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
.poke-card:hover::before { opacity: 1; }
.poke-num { font-family: 'DM Mono', monospace; font-size: 10px; color: #aaa; margin-bottom: 6px; }
.poke-sprite {
  width: 72px; height: 72px; image-rendering: pixelated;
  display: block; margin: 0 auto 8px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); transition: transform 0.2s;
}
.poke-card:hover .poke-sprite { transform: scale(1.08) translateY(-2px); }
.poke-name { font-size: 15px; font-weight: 700; color: #222; text-transform: capitalize; margin-bottom: 8px; }
.poke-types { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
.type-chip {
  font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--surface); border: 1px solid var(--border-hover); border-radius: 24px;
  max-width: 440px; width: 100%; max-height: 88vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(0.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-top { padding: 28px 24px 20px; text-align: center; position: relative; border-bottom: 1px solid var(--border); }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  width: 32px; height: 32px; color: var(--text-sub); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { background: var(--surface3); color: var(--text); }
.modal-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.modal-sprite { width: 120px; height: 120px; image-rendering: pixelated; display: block; margin: 0 auto 12px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); }
.modal-name { font-size: 26px; font-weight: 800; text-transform: capitalize; letter-spacing: -0.5px; margin-bottom: 10px; }
.modal-body { padding: 20px 24px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.info-cell { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.info-cell-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.info-cell-val { font-size: 15px; font-weight: 600; }
.stats-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
.stat-row { margin-bottom: 10px; }
.stat-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 5px; font-weight: 500; }
.stat-track { height: 6px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
  padding: 10px 18px; border-radius: var(--radius-sm); cursor: pointer; border: none; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #ff5555; box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
.btn-secondary { background: var(--surface2); color: var(--text-sub); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface3); color: var(--text); }
.team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
@media(min-width:500px){ .team-grid { grid-template-columns: repeat(3,1fr); } }
.team-slot {
  background: var(--surface2); border: 1.5px dashed var(--border); border-radius: var(--radius);
  padding: 16px 12px; min-height: 130px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; text-align: center; position: relative;
}
.team-slot:hover { border-color: var(--border-hover); background: var(--surface3); }
.team-slot.filled { border-style: solid; border-color: rgba(255,61,61,0.3); }
.slot-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.plus { font-size: 24px; color: var(--text-muted); }
.add-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.rm { position: absolute; top: 8px; right: 8px; background: var(--surface3); border: none; border-radius: 6px; width: 22px; height: 22px; color: var(--text-muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.rm:hover { background: rgba(255,61,61,0.2); color: var(--accent); }
.slot-name { font-size: 13px; font-weight: 700; text-transform: capitalize; margin-top: 6px; color: #222; }
.coverage-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius); padding: 20px 24px; }
.coverage-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 16px; }
.coverage-section { margin-bottom: 14px; }
.coverage-section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.coverage-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.type-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 24px; }
.type-select-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; cursor: pointer; text-align: center; transition: all 0.2s; }
.type-select-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.type-select-card.selected { border-color: rgba(255,255,255,0.25); background: var(--surface3); }
.type-select-emoji { font-size: 22px; margin-bottom: 5px; }
.type-select-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.matchup-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; animation: slideUp 0.2s ease; }
.matchup-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.matchup-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.matchup-row { margin-bottom: 12px; }
.matchup-row-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; }
.none-label { font-size: 12px; color: var(--text-muted); }
.tm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.tm-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius-sm); padding: 8px 12px; transition: all 0.15s; display:flex; align-items:center; gap:10px; }
.tm-card:hover { border-color: rgba(0,0,0,0.15); background: #f9f9f9; }
.tm-header { display: flex; align-items: center; gap: 8px; flex:1; min-width:0; }
.tm-num { font-family: 'DM Mono', monospace; font-size: 10px; background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 5px; color: var(--text-muted); white-space:nowrap; flex-shrink:0; }
.tm-move { font-size: 13px; font-weight: 700; flex: 1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#222; }
.tm-meta { font-size: 12px; font-weight: 700; color: #222; white-space:nowrap; flex-shrink:0; }
.tm-loc { display:none; }
.evo-list { display: flex; flex-direction: column; gap: 10px; }
.evo-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius); padding: 20px 24px; transition: border-color 0.15s; }
.evo-card:hover { border-color: rgba(0,0,0,0.15); }
.evo-chain { display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: nowrap; width: 100%; }
.evo-item { display: flex; align-items: center; flex: 1; justify-content: center; gap: 0; }
.evo-mon { text-align: center; cursor: pointer; transition: transform 0.2s; padding: 4px; }
.evo-mon:hover { transform: scale(1.1); }
.evo-mon img { width: 56px; height: 56px; image-rendering: pixelated; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
.evo-mon-name { font-size: 11px; font-weight: 600; text-transform: capitalize; margin-top: 4px; color: #222; }
.evo-arr { font-size: 20px; color: var(--text-muted); }
.evo-cond { font-size: 10px; font-weight: 600; color: var(--accent); background: rgba(255,61,61,0.1); padding: 2px 7px; border-radius: 100px; margin-top: 3px; display: inline-block; }
.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; transition: all 0.15s; }
.item-card:hover { border-color: rgba(0,0,0,0.15); background: #f9f9f9; }
.item-icon-wrap { width: 40px; height: 40px; background: rgba(0,0,0,0.06); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.item-content { flex: 1; min-width: 0; }
.item-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: #111; letter-spacing: -0.2px; }
.item-loc { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
.item-effect { font-size: 12px; color: var(--green); }
.item-cat { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 100px; background: rgba(0,0,0,0.06); color: #888; flex-shrink: 0; align-self: flex-start; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 9px; }
.loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-state p { font-size: 14px; }
.rank-stat-btn { font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; padding:7px 14px; border-radius:100px; border:1.5px solid var(--border); background:none; color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
.rank-stat-btn:hover { color:var(--text); border-color:var(--border-hover); }
.rank-stat-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.rank-row { display:flex; align-items:center; gap:10px; background:#fff; border:1px solid rgba(0,0,0,0.08); border-radius:12px; padding:9px 14px; margin-bottom:6px; cursor:pointer; transition:all 0.15s; }
.rank-row:hover { border-color:rgba(0,0,0,0.15); background:#fafafa; }
.rank-pos { font-family:'DM Mono',monospace; font-size:11px; font-weight:700; color:#bbb; width:26px; flex-shrink:0; }
.rank-pos.top3 { color:var(--gold); }
.rank-sprite { width:36px; height:36px; image-rendering:pixelated; flex-shrink:0; }
.rank-name { font-size:13px; font-weight:700; color:#222; text-transform:capitalize; width:90px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-types { display:flex; gap:3px; width:100px; flex-shrink:0; }
.rank-bar-wrap { flex:1; }
.rank-bar-track { height:7px; background:rgba(0,0,0,0.08); border-radius:4px; overflow:hidden; }
.rank-bar-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
.rank-val { font-family:'Outfit',sans-serif; font-size:13px; font-weight:800; color:#222; width:38px; flex-shrink:0; text-align:right; }
.modal-tabs { display: flex; gap: 2px; background: var(--surface3); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.modal-tab { flex: 1; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; padding: 7px 4px; border: none; border-radius: 8px; cursor: pointer; background: none; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
.modal-tab:hover { color: var(--text); }
.modal-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.modal-tab-content { min-height: 120px; animation: slideUp 0.15s ease; }
.move-list { display: flex; flex-direction: column; gap: 4px; }
.move-head { display: grid; grid-template-columns: 28px 1fr auto 36px 32px 24px; gap: 8px; padding: 4px 10px 6px; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
.move-head span { text-align: right; }
.move-head span:nth-child(1),.move-head span:nth-child(2) { text-align: left; }
.move-head span:nth-child(3),.move-head span:nth-child(4),.move-head span:nth-child(5) { text-align: center; }
.move-row .type-chip { justify-self: center; }
.move-row { display: grid; grid-template-columns: 28px 1fr auto 36px 32px 24px; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(0,0,0,0.04); border-radius: 8px; font-size: 12px; }
.move-lv { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text-muted); }
.move-name { font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.move-pw { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; text-align: center; }
.move-acc { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; text-align: center; }
.move-pp { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; text-align: right; }
.tm-pill-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tm-pill { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 100px; }
.matchup-section { margin-bottom: 14px; }
.matchup-section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 7px; }
.modal-empty { font-size: 13px; color: var(--text-muted); padding: 16px 0; }
.modal-empty-inline { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="/logo.png" alt="FireRed Logo" style="width:52px;height:52px;object-fit:contain;">
    <div>FireRed <span class="logo-sub">Companion App</span></div>
  </div>
  <div style="margin-left:auto;position:relative;" id="site-nav-wrap">
    <button id="site-nav-btn" onclick="toggleSiteNav()" style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;padding:9px 14px;cursor:pointer;transition:all 0.15s;">
      <span id="site-nav-label">Pokédex</span>
      <svg id="site-nav-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" style="transition:transform 0.2s;"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div id="site-nav-menu" style="display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-width:120px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:100;">
      <button class="snav-item active" onclick="switchTab('pokedex');toggleSiteNav()" data-label="Pokédex">Pokédex</button>
      <button class="snav-item" onclick="switchTab('team');toggleSiteNav()" data-label="Team">Team</button>
      <button class="snav-item" onclick="switchTab('rankings');toggleSiteNav()" data-label="Rankings">Rankings</button>

function sprite(id){
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-iii/firered-leafgreen/${id}.png`;
}
function typeChip(t){const c=TYPE_COLORS[t]||'#888';return`<span class="type-chip" style="background:${c}20;color:${c};border:1px solid ${c}40">${t}</span>`;}
function statColor(v){return v>=100?'#34d399':v>=60?'#fbbf24':'#f87171';}
function pwColor(v){return v==='—'?'var(--text-muted)':v>=90?'#34d399':v>=60?'#fbbf24':'#f87171';}
function accColor(v){return v==null?'var(--text-muted)':v>=100?'#34d399':v>=85?'#fbbf24':'#f87171';}
function ppColor(v){return !v?'var(--text-muted)':v>=30?'#34d399':v>=15?'#fbbf24':'#f87171';}

function loadPokedex(){
  pokemonData = POKEMON_DATA;
  renderPokedex(pokemonData);
  renderDexFilters();
  renderTypeSelector();
  renderPickerGrid(pokemonData);
  renderRankings();
}

function typeChipFilter(t){
  const c=TYPE_COLORS[t]||'#888';
  const active=dexTF===t;
  return `<span class="type-chip" style="background:${c}${active?'40':'20'};color:${c};border:1.5px solid ${c}${active?'90':'40'};cursor:pointer;transition:all 0.15s;" onclick="event.stopPropagation();toggleDexType('${t}')">${t}</span>`;
}

function renderPokedex(data){
  const g=document.getElementById('pokedex-grid');
  if(!data.length){g.innerHTML='<p style="color:var(--text-muted);font-size:14px;">No results found.</p>';return;}
  g.innerHTML=data.map(p=>`<div class="poke-card" onclick="openPokeModal(${p.id})" style="--card-color:${TYPE_COLORS[p.types[0]]||'#888'}22"><div class="poke-num">#${String(p.id).padStart(3,'0')}</div><img class="poke-sprite" src="${sprite(p.id)}" alt="${p.name}" loading="lazy"><div class="poke-name">${p.name}</div><div class="poke-types">${p.types.map(typeChipFilter).join('')}</div></div>`).join('');
}

function filterPokedex(){const q=document.getElementById('dex-search').value.toLowerCase();let f=pokemonData.filter(p=>p.name.includes(q)||String(p.id).includes(q));if(dexTF)f=f.filter(p=>p.types.includes(dexTF));renderPokedex(f);}

function renderDexFilters(){
  const types=[...new Set(pokemonData.flatMap(p=>p.types))].sort();
  const sel=document.getElementById('type-filter-select');
  types.forEach(t=>{
    const opt=document.createElement('option');
    opt.value=t;
    opt.textContent=(TYPE_EMOJI[t]||'') + ' ' + t.charAt(0).toUpperCase()+t.slice(1);
    sel.appendChild(opt);
  });
}

function selectDexType(t){
  dexTF=t||null;
  filterPokedex();
  // also re-render cards so typeChipFilter highlights correctly
  const q=document.getElementById('dex-search').value.toLowerCase();
  let f=pokemonData.filter(p=>p.name.includes(q)||String(p.id).includes(q));
  if(dexTF)f=f.filter(p=>p.types.includes(dexTF));
  renderPokedex(f);
}

function toggleDexType(t){
  dexTF=dexTF===t?null:t;
  const sel=document.getElementById('type-filter-select');
  if(sel) sel.value=dexTF||'';
  filterPokedex();
}

// ── PER-POKÉMON LEVEL-UP MOVES (Fire Red) ──────────────────────────────────
// Move + TM data fetched live from PokeAPI, cached per session
const moveCache = {}; // id -> {levelup: [...], tms: [...]}

async function fetchPokeMovesAndTMs(id) {
  if (moveCache[id]) return moveCache[id];
  try {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const data = await res.json();
    const allMoves = data.moves;

    // Level-up moves for firered version group
    const levelup = [];
    const tms = [];

    for (const m of allMoves) {
      for (const vg of m.version_group_details) {
        if (vg.version_group.name === 'firered-leafgreen') {
          const moveName = m.move.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          if (vg.move_learn_method.name === 'level-up') {
            levelup.push({ lv: vg.level_learned_at, name: moveName, moveUrl: m.move.url });
          } else if (vg.move_learn_method.name === 'machine') {
            tms.push({ name: moveName, moveUrl: m.move.url });
          }
        }
      }
    }

    // Sort level-up moves by level
    levelup.sort((a, b) => a.lv - b.lv);

    // Fetch move details (type + power) for level-up moves in parallel
    const levelupDetails = await Promise.all(levelup.map(async m => {
      try {
        const r = await fetch(m.moveUrl);
        const d = await r.json();
        return { lv: m.lv, name: m.name, type: d.type.name, pw: d.power || '—', acc: d.accuracy, pp: d.pp };
      } catch { return { lv: m.lv, name: m.name, type: 'normal', pw: '—' }; }
    }));

    // Fetch TM move details in parallel
    const tmDetails = await Promise.all(tms.map(async m => {
      try {
        const r = await fetch(m.moveUrl);
        const d = await r.json();
        // Find matching TM number from our TM_DATA
        const moveLookup = TM_DATA.find(t => t.move.toLowerCase() === m.name.toLowerCase());
        return { name: m.name, type: d.type.name, pw: d.power || '—', num: moveLookup ? moveLookup.num : '' };
      } catch { return { name: m.name, type: 'normal', pw: '—', num: '' }; }
    }));

    // Sort TMs by TM number
    tmDetails.sort((a, b) => {
      const n = x => { const m = x.num.match(/(\d+)/); return m ? parseInt(m[1]) + (x.num.startsWith('HM') ? 100 : 0) : 999; };
      return n(a) - n(b);
    });

    moveCache[id] = { levelup: levelupDetails, tms: tmDetails };
    return moveCache[id];
  } catch (e) {
    return null;
  }
}

const locationCache = {};

async function fetchPokeLocations(id) {
  if (locationCache[id]) return locationCache[id];
  try {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}/encounters`);
    const data = await res.json();
    const fmtName = s => s.replace(/-area$/,'').split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    const fmtMethod = m => ({'walk':'Walking','surf':'Surfing','old-rod':'Old Rod','good-rod':'Good Rod','super-rod':'Super Rod','rock-smash':'Rock Smash'}[m]||m.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()));
    const merged = {};
    for (const enc of data) {
      for (const vd of enc.version_details) {
        if (vd.version.name === 'firered') {
          for (const e of vd.encounter_details) {
            const key = `${fmtName(enc.location_area.name)}|${fmtMethod(e.method.name)}`;
            if (!merged[key]) merged[key] = { area: fmtName(enc.location_area.name), method: fmtMethod(e.method.name), min: e.min_level, max: e.max_level };
            else { merged[key].min = Math.min(merged[key].min, e.min_level); merged[key].max = Math.max(merged[key].max, e.max_level); }
          }
        }
      }
    }
    const unique = Object.values(merged).map(l => ({ area: l.area, method: l.method, lvl: l.min === l.max ? `Lv. ${l.min}` : `Lv. ${l.min}–${l.max}` }));
    locationCache[id] = unique;
    return unique;
  } catch { return null; }
}

    const data = await fetchPokeMovesAndTMs(p.id);

    if (!data) {
      content = `<p class="modal-empty">⚠️ Couldn't load move data. Check your connection.</p>`;
    } else if (modalTab === 'moves') {
      const moves = data.levelup;
      if (!moves.length) {
        content = `<p class="modal-empty">No level-up moves found for Fire Red.</p>`;
      } else {
        content = `<div class="tm-grid">${moves.map(m=>`<div class="tm-card"><span class="tm-num">${m.lv?String(m.lv).padStart(2,'0'):'—'}</span><span class="tm-move">${m.name}</span>${typeChip(m.type)}<span class="tm-meta">${m.pw!=='—'?m.pw:'—'}</span></div>`).join('')}</div>`;
      }
    } else {
      const tms = data.tms;
      if (!tms.length) {
        content = `<p class="modal-empty">No TM/HM compatibility found for Fire Red.</p>`;
      } else {
        content = `<div class="tm-grid">${tms.map(t=>`<div class="tm-card">${t.num?`<span class="tm-num">${t.num}</span>`:''}<span class="tm-move">${t.name}</span>${typeChip(t.type)}<span class="tm-meta">${t.pw!=='—'?t.pw:'—'}</span></div>`).join('')}</div>`;
      }
    }

  } else if(modalTab==='types'){
    const allTypes = Object.keys(TYPE_COLORS);

    const atkSE=[], atkNVE=[], atkNone=[];
    p.types.forEach(at=>{
      allTypes.forEach(dt=>{
        const v=(TYPE_CHART[at]||{})[dt];
        if(v===2 && !atkSE.includes(dt)) atkSE.push(dt);
        if(v===0 && !atkNone.includes(dt)) atkNone.push(dt);
        else if(v===0.5 && !atkNVE.includes(dt) && !atkNone.includes(dt)) atkNVE.push(dt);
      });
    });
    // Defender columns
    const defWeak4=[], defWeak2=[], defResist=[], defResist2=[], defImmune=[];
    allTypes.forEach(at=>{
      let mult=1;
      p.types.forEach(dt=>{ mult*=(TYPE_CHART[at]||{})[dt]??1; });
      if(mult>=4) defWeak4.push(at);
      else if(mult===2) defWeak2.push(at);
      else if(mult===0) defImmune.push(at);
      else if(mult<=0.25) defResist2.push(at);
      else if(mult<1) defResist.push(at);

    const bubble=(label,color,chips)=>chips.length?`<div style="border-radius:12px;border:1px solid rgba(0,0,0,0.08);background:#fff;padding:10px 12px;margin-bottom:8px;"><div style="font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#222;margin-bottom:8px;">${label}</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${chips.map(typeChip).join('')}</div></div>`:'';

    content=`<div>
      ${sectionTitle('⚔️ Attack')}
      ${bubble('×2 — Super Effective','#34d399',atkSE)||bubble('','#9898aa',[])||'<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">—</div>'}
      ${bubble('×0.5 — Not Very Effective','#fbbf24',atkNVE)}
      ${bubble('×0 — No Effect','#9898aa',atkNone)}
      ${sectionTitle('🛡️ Defense')}
      ${bubble('×4 — Very Weak','#f87171',defWeak4)}
      ${bubble('×2 — Weak','#fbbf24',defWeak2)||'<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">—</div>'}
      ${bubble('×0.5 — Resists','#34d399',defResist)}
      ${bubble('×0.25 — Double Resists','#60a5fa',defResist2)}
      ${bubble('×0 — Immune','#9898aa',defImmune)}
    </div>`;
  }

  if(modalTab==='evos'){
    const chains=EVO_DATA.filter(({chain})=>chain.some(m=>m.id===p.id));
    if(!chains.length){
      content=`<p class="modal-empty">No evolution data for ${p.name}.</p>`;

    }
  }

  document.getElementById('modal-body').innerHTML = `
    ${tabBar}
    <div class="modal-tab-content">${content}</div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="addFromModal(${p.id})">+ Add to Team</button>`;
}

function getStatVal(p, stat) {
  if (stat === 'total') return p.stats.reduce((s, x) => s + x.val, 0);
  const s = p.stats.find(x => x.name === stat);
  return s ? s.val : 0;
}

function renderRankings() {
  populateRankTypeSelect();
  const maxVal = rankStat === 'total' ? 780 : 255;
  const filtered = rankType ? pokemonData.filter(p => p.types.includes(rankType)) : pokemonData;
  const sorted = [...filtered].sort((a, b) => getStatVal(b, rankStat) - getStatVal(a, rankStat));
  document.getElementById('rankings-list').innerHTML = sorted.map((p, i) => {
    const val = getStatVal(p, rankStat);
    const pct = Math.min(100, (val / maxVal) * 100);
    const color = val >= 120 ? '#34d399' : val >= 80 ? '#60a5fa' : val >= 50 ? '#fbbf24' : '#f87171';
    const onTeam = rankHighlightTeam && team.includes(p.id);
    return `<div class="rank-row" onclick="openPokeModal(${p.id})" style="${onTeam ? 'border-color:#93c5fd;background:#dbeafe;' : ''}">
      <span class="rank-pos ${i < 3 ? 'top3' : ''}">#${i + 1}</span>
      <img class="rank-sprite" src="${sprite(p.id)}" alt="${p.name}">
      <span class="rank-name">${p.name}</span>
      ${onTeam ? '<span style="font-size:12px;">⭐</span>' : ''}
      <div class="rank-bar-wrap">
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>
      <span class="rank-val">${val}</span>
    </div>`;
  }).join('');
}

function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  // update dropdown button label + active state
  const active = document.querySelector(`.snav-item[onclick*="'${name}'"]`);
  document.querySelectorAll('.snav-item').forEach(x=>x.classList.remove('active'));
  if(active){
    active.classList.add('active');
    document.getElementById('site-nav-label').textContent = active.dataset.label;
  }
}
function toggleSiteNav(){
  const menu=document.getElementById('site-nav-menu');
  const arrow=document.getElementById('site-nav-arrow');
  const open=menu.style.display==='none';
  menu.style.display=open?'block':'none';
  arrow.style.transform=open?'rotate(180deg)':'rotate(0deg)';
}
// close menu on outside click
document.addEventListener('click',e=>{
  const wrap=document.getElementById('site-nav-wrap');
  if(wrap&&!wrap.contains(e.target)){
    document.getElementById('site-nav-menu').style.display='none';
    document.getElementById('site-nav-arrow').style.transform='rotate(0deg)';
  }
});

document.getElementById('poke-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePokeModal();});
document.getElementById('picker-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePicker();});

loadPokedex();renderTMFilters();renderTMs(TM_DATA);renderItemFilters();renderItems(ITEM_DATA);renderEvolutions(EVO_DATA);renderTeam();
</script>
